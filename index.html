  <style>
    /* Print Optimization for Resume PDF Export */
    @media print {
      body {
        background: white !important;
        color: black !important;
      }

      /* Hide interactive/fixed elements */
      header,
      nav,
      footer,
      .bg-grid,
      .bg-noise,
      button {
        display: none !important;
      }

      /* Hide System Console and Scroll Progress */
      div[class*="fixed bottom-6"],
      div[class*="fixed top-0"] {
        display: none !important;
      }

      /* Adjust Layout for Paper */
      main {
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      section {
        padding: 2rem 0 !important;
        page-break-inside: avoid;
      }

      /* Ensure text contrast */
      p,
      h1,
      h2,
      h3,
      h4,
      span {
        color: black !important;
        text-shadow: none !important;
      }

      /* Expand links for print reading */
      a[href^="http"]:after {
        content: " (" attr(href) ")";
        font-size: 0.8em;
        color: #666;
      }
    }
  </style>
